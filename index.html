<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Immersive Reading Typing Trainer</title>

<style>
body{
    font-family:system-ui;
    padding:40px;
    background:#fafafa;
}

.container{
    display:flex;
    gap:40px;
}

.leftCol{flex:1.6;}
.rightCol{flex:1;}

.typingStage{
    position:relative;
    margin-top:10px;
}

#sentence{
    line-height:1.9;
    height:320px;
    overflow-y:auto;
    font-size:30px;
    border:1px solid #ddd;
    padding:16px;
    border-radius:12px;
    background:white;
    scroll-behavior: smooth;
}

#typingBox{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    opacity:0;
    font-size:30px;
}

#translation{
    margin-top:10px;
    height:600px;
    overflow-y:auto;
    border:1px solid #eee;
    padding:16px;
    border-radius:12px;
    background:white;
    font-size:22px;
    color:#1565c0;
    line-height:1.8;
}

.caret{
    display:inline-block;
    width:2px;
    height:1em;
    background:#222;
    margin-left:1px;
    vertical-align:bottom;
    animation: blink 1s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

.progressBar{
    height:8px;
    background:#eee;
    border-radius:6px;
    margin-top:12px;
    overflow:hidden;
}

.progressInner{
    height:100%;
    width:0%;
    background:#4caf50;
}
</style>

</head>

<body>

<h2>貼上英文文章</h2>

<textarea id="article" style="width:800px;height:160px"></textarea>

<p id="wordCount">單字數：0</p>

<button onclick="startPractice()">開始練習</button>

<hr>

<div class="container">

<div class="leftCol">

<div class="typingStage">
<div id="sentence"></div>
<textarea id="typingBox"></textarea>
</div>

<div class="progressBar">
<div id="progressInner" class="progressInner"></div>
</div>

</div>

<div class="rightCol">
<div id="translation"></div>
</div>

</div>

<script>

// ⭐ 修 race condition 用
let pendingText = null

let sentences=[]
let index=0
let typedHistory=""
let fullLength=0

document.getElementById("article").addEventListener("input",function(){
    let text=this.value.trim()
    let words=text?text.split(/\s+/).length:0
    document.getElementById("wordCount").innerText="單字數："+words
})

function normalizeArticle(text){
    return text.replace(/[\r\n]+/g," ").replace(/\s+/g," ").trim()
}

function startPractice(){
    let cleaned=normalizeArticle(document.getElementById("article").value)

    sentences=(cleaned.match(/[^.!?]+[.!?]+\s*/g)||[])

    index=0
    typedHistory=""
    fullLength=cleaned.length

    document.getElementById("typingBox").value=""
    document.getElementById("translation").innerHTML=""

    document.getElementById("typingBox").focus()

    render("")
}

function updateProgress(len){
    let percent=Math.floor(len/fullLength*100)
    document.getElementById("progressInner").style.width=percent+"%"
}

function smartScroll(box){
    const caret = box.querySelector(".caret")
    if(!caret) return

    const caretTop = caret.offsetTop
    const boxHeight = box.clientHeight

    box.scrollTop = caretTop - boxHeight * 0.5
}

function render(current){

    let html="<span style='color:#999'>"+typedHistory+"</span>"
    let target=sentences[index]||""

    let maxLen=Math.max(target.length,current.length)

    for(let i=0;i<maxLen;i++){

        let t=target[i]||""
        let c=current[i]||""

        if(i < current.length){

            if(c===t){
                html+="<span style='color:green'>"+(t||c)+"</span>"
            }else{
                html+="<span style='background:#ffd6d6;color:#d00'>"+(t||c)+"</span>"
            }

        }else{

            if(i===current.length){
                html+="<span class='caret'></span>"
            }

            html+="<span style='color:#ccc'>"+t+"</span>"
        }
    }

    let box=document.getElementById("sentence")
    box.innerHTML=html
    smartScroll(box)
}

document.getElementById("typingBox")
.addEventListener("input", async function(){

    let value=this.value
    let target=sentences[index]||""
    let current=value.substring(typedHistory.length)

    render(current)
    updateProgress(value.length)

    if(value===typedHistory+target){

        typedHistory+=target
        index++

        let res=await fetch(
            "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q="
            + encodeURIComponent(target)
        )

        let data=await res.json()
        document.getElementById("translation").innerHTML+=data[0][0][0]+" "

        render("")
    }
})


// ⭐ 接收 extension / postMessage
window.addEventListener("message", function(event){

    if(event.data.action==="LOAD_TEXT"){

        let text = event.data.text

        if(!document.getElementById("article")){
            pendingText = text
            return
        }

        loadText(text)
    }
})

// ⭐ 頁面載入後補資料
window.addEventListener("load", function(){

    if(pendingText){
        loadText(pendingText)
        pendingText = null
    }

})

// ⭐ 共用
function loadText(text){
    document.getElementById("article").value = text

    let words=text.trim().split(/\s+/).length
    document.getElementById("wordCount").innerText="單字數："+words
}

</script>

</body>
</html>
